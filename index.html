<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />

    <title>MYIA Tech | Coming Soon</title>
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://myiatech.com/" />
    <meta
      name="description"
      content="MYIA Tech is launching soon. Leave your email and get notified when we have updates about the MYIA project."
    />

    <meta property="og:title" content="MYIA Tech | Coming Soon" />
    <meta
      property="og:description"
      content="MYIA Tech is launching soon. Leave your email and get notified when we have updates about the MYIA project."
    />
    <meta property="og:url" content="https://myiatech.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MYIA Tech | Coming Soon" />
    <meta
      name="twitter:description"
      content="MYIA Tech is launching soon. Leave your email and get notified when we have updates."
    />

    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />

    <link rel="stylesheet" href="/styles.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MYIA Tech",
        "url": "https://myiatech.com/",
        "email": "contact@myiatech.com"
      }
    </script>
  </head>
  <body>
    <main class="wrap">
      <section class="coming" aria-label="Coming soon">
        <div class="logoLockup" aria-label="MYIA logo">
          <img
            class="logoLockup__mark"
            src="/myia-logo.png"
            alt="MYIA"
            width="220"
            height="220"
            loading="eager"
          />
        </div>

        <h1 class="headline">COMING SOON</h1>
        <p class="subhead">
          Leave your email and we will notify you when we have news about the
          project.
        </p>

        <div class="notify" id="notify">
        <!-- Formspree (free tier). -->
        <form
          class="form"
          name="notify"
          method="POST"
          action="https://formspree.io/f/mjgewren"
          novalidate
        >
          <input
            type="hidden"
            name="message"
            value="I'd like to be notified when you have news about the MYIA project."
          />
          <input class="honeypot" type="text" name="_gotcha" tabindex="-1" autocomplete="off" />

          <label class="sr-only" for="email">Email</label>
          <div class="form__row">
            <input
              id="email"
              name="email"
              class="form__input"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              inputmode="email"
              aria-describedby="email-msg"
              required
            />
            <button class="form__btn" type="submit">Get notified</button>
          </div>
          <p class="fieldMsg" id="email-msg" aria-live="polite"></p>
          <p class="form__meta">
            No spam. Unsubscribe anytime.
          </p>
          <p class="form__status" role="status" aria-live="polite"></p>
        </form>
        </div>

        <div class="links">
          <a
            class="ctaLink ctaLink--email"
            href="mailto:contact@myiatech.com?subject=MYIA%20Tech%20-%20Hello"
            >contact@myiatech.com</a
          >
        </div>
      </section>

      <footer class="footer">
        <small>© <span id="year"></span> MYIA. All rights reserved.</small>
      </footer>
    </main>

    <script src="/script.js" defer></script>
  </body>
</html>
