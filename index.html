<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />

    <title>MYIA | Coming Soon</title>
    <meta
      name="description"
      content="MYIA is launching soon. Leave your email to get the launch update."
    />

    <meta property="og:title" content="MYIA | Coming Soon" />
    <meta
      property="og:description"
      content="MYIA is launching soon. Leave your email to get the launch update."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="bg__grain"></div>
      <div class="bg__orb bg__orb--a"></div>
      <div class="bg__orb bg__orb--b"></div>
      <div class="bg__orb bg__orb--c"></div>
    </div>

    <main class="wrap">
      <section class="coming" aria-label="Coming soon">
        <div class="logoLockup" aria-label="MYIA logo">
          <img
            class="logoLockup__mark"
            src="/myia-logo.png"
            alt="MYIA"
            width="220"
            height="220"
            loading="eager"
          />
        </div>

        <p class="kicker">Coming soon</p>
        <h1 class="headline">A new experience is on the way.</h1>
        <p class="subhead">
          Leave your email and we will notify you when we launch.
        </p>

        <div class="notify" id="notify">
        <!-- Netlify form (data-netlify="true"). -->
        <form
          class="form"
          name="notify"
          method="POST"
          data-netlify="true"
          netlify-honeypot="bot-field"
        >
          <input type="hidden" name="form-name" value="notify" />
          <p class="honeypot">
            <label>Do not fill: <input name="bot-field" /></label>
          </p>

          <label class="sr-only" for="email">Email</label>
          <div class="form__row">
            <input
              id="email"
              name="email"
              class="form__input"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              inputmode="email"
              required
            />
            <button class="form__btn" type="submit">Notify me</button>
          </div>
          <p class="form__meta">
            No spam. Unsubscribe anytime.
          </p>
          <p class="form__status" role="status" aria-live="polite"></p>
        </form>
        </div>

        <div class="links">
          <a class="ctaLink" href="mailto:contact@myiatech.com"
            >contact@myiatech.com</a
          >
        </div>
      </section>

      <footer class="footer">
        <small>© <span id="year"></span> MYIA. All rights reserved.</small>
      </footer>
    </main>

    <script src="/script.js" defer></script>
  </body>
</html>
